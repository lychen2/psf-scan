name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"

      - name: Install Qt system libs (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: Import smoke (verify drivers + UI modules import cleanly)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import psf_scan; print('psf_scan', psf_scan.__file__)"
          python -c "from psf_scan.drivers import camera_mock, stage_mock; print('mock drivers OK')"
          python -c "from psf_scan import app; print('app module OK')"
