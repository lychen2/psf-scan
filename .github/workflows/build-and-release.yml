name: Build & release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Run JS-based actions on Node 24; default forced June 2026 anyway, opt-in early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Create build venv and install deps
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-build\Scripts\python.exe -m pip install -r installer\requirements-build.txt
          .\.venv-build\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run pytest
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: .\.venv-build\Scripts\python.exe -m pytest tests/ -q

      - name: Restore PI GCS2 DLL
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $dest = "installer\vendored"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          gh release download pi-runtime --pattern "PI_GCS2_DLL_x64.dll" --dir $dest --clobber
          $dll = Join-Path $dest "PI_GCS2_DLL_x64.dll"
          if (-not (Test-Path $dll)) { throw "PI_GCS2_DLL_x64.dll missing from pi-runtime release asset" }
          $sha = (Get-FileHash $dll -Algorithm SHA256).Hash
          Write-Host "[build] restored PI_GCS2_DLL_x64.dll SHA256=$sha"

      - name: Build installer + portable zip
        shell: pwsh
        run: .\installer\build.ps1

      - name: Validate PI GCS2 DLL packaged
        shell: pwsh
        run: |
          $hits = Get-ChildItem "build\dist\PsfScan" -Recurse -Filter "PI_GCS2_DLL_x64.dll"
          if (-not $hits) { throw "PI_GCS2_DLL_x64.dll was not packaged into build\dist\PsfScan" }
          $hits | ForEach-Object { Write-Host "[build] packaged PI DLL: $($_.FullName)" }

      - name: Smoke test PsfScan.exe
        shell: pwsh
        env:
          QT_QPA_PLATFORM: minimal
          PSF_SCAN_SMOKE: "1"
        run: |
          Write-Host "Launching PsfScan.exe in smoke mode..."
          $proc = Start-Process -FilePath "build\dist\PsfScan\PsfScan.exe" -PassThru -Wait
          Write-Host "Exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "PsfScan.exe smoke test failed (exit $($proc.ExitCode))" }

      - name: Show artifacts
        shell: pwsh
        run: Get-ChildItem release | Format-Table Name, Length, LastWriteTime

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PsfScan-windows-installer
          path: release/PsfScan-Setup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: PsfScan-windows-portable
          path: release/PsfScan-*-portable.zip
          if-no-files-found: error
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Qt + packaging deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            ruby ruby-dev build-essential rpm fuse libfuse2
          sudo gem install --no-document fpm

      - name: Create build venv and install deps
        run: |
          python -m venv .venv-build
          .venv-build/bin/pip install --upgrade pip
          .venv-build/bin/pip install -r installer/requirements-build.txt
          .venv-build/bin/pip install -e ".[dev]"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: .venv-build/bin/python -m pytest tests/ -q

      - name: PyInstaller
        run: |
          .venv-build/bin/python -m PyInstaller --noconfirm --clean \
            --distpath build/dist \
            --workpath build/temp \
            installer/psf_scan.spec

      - name: Smoke test PsfScan
        env:
          QT_QPA_PLATFORM: minimal
          PSF_SCAN_SMOKE: "1"
        run: |
          ./build/dist/PsfScan/PsfScan
          echo "Exit code: $?"

      - name: Read version
        id: version
        run: |
          VER=$(jq -r .version installer/version.json)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Version = $VER"

      - name: Stage Linux package layout
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          STAGE=build/linux-stage
          rm -rf "$STAGE"
          mkdir -p "$STAGE/opt/PsfScan"
          cp -r build/dist/PsfScan/* "$STAGE/opt/PsfScan/"

          mkdir -p "$STAGE/usr/share/applications"
          cat > "$STAGE/usr/share/applications/PsfScan.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=PSF Scan
          Comment=Stage-scan PSF acquisition GUI
          Exec=/opt/PsfScan/PsfScan
          Icon=PsfScan
          Categories=Science;Education;
          Terminal=false
          EOF

          mkdir -p "$STAGE/usr/share/icons/hicolor/256x256/apps"
          cp installer/resources/icon.png "$STAGE/usr/share/icons/hicolor/256x256/apps/PsfScan.png"

          mkdir -p "$STAGE/usr/local/bin"
          ln -sf /opt/PsfScan/PsfScan "$STAGE/usr/local/bin/psf-scan"

      - name: Build .deb
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          fpm -s dir -t deb \
            -n psf-scan -v "$VER" \
            --architecture amd64 \
            --description "PSF Scan - stage-scan PSF acquisition GUI" \
            --maintainer "PSF Scan support" \
            --license "Proprietary" \
            --depends libgl1 --depends libegl1 \
            --depends libxkbcommon0 --depends libxcb-cursor0 \
            -p "release/PsfScan-${VER}-linux-amd64.deb" \
            -C build/linux-stage \
            opt usr

      - name: Build .AppImage
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          # Get appimagetool (use --appimage-extract-and-run to skip FUSE).
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

          APPDIR=build/PsfScan.AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r build/dist/PsfScan/* "$APPDIR/usr/bin/"

          cp installer/resources/icon.png "$APPDIR/PsfScan.png"

          cat > "$APPDIR/PsfScan.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=PSF Scan
          Exec=PsfScan
          Icon=PsfScan
          Categories=Science;Education;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/PsfScan" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APPDIR" "release/PsfScan-${VER}-linux-x86_64.AppImage"

      - name: Show artifacts
        run: ls -la release/

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: PsfScan-linux-deb
          path: release/PsfScan-*-linux-amd64.deb
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: PsfScan-linux-appimage
          path: release/PsfScan-*-linux-x86_64.AppImage
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -printf '%P  %s bytes\n'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PsfScan-windows-installer/*
            artifacts/PsfScan-windows-portable/*
            artifacts/PsfScan-linux-deb/*
            artifacts/PsfScan-linux-appimage/*
          generate_release_notes: true
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
